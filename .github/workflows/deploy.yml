name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Prepare Pages artifact
        run: |
          rm -rf pages-artifact
          mkdir -p pages-artifact/images
          cp index.html pages-artifact/index.html
          if [ -d images ]; then
            cp -R images/. pages-artifact/images/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './pages-artifact'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
