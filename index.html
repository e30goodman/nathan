<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BassMastery - Espace Nathan</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #1e293b; }
      ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #5b21b6; }
      .fade-in { animation: fadeIn 0.3s ease-in-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

      .zoom-viewport {
        touch-action: none;
        overflow: hidden;
        cursor: default;
        width: 100%;
        height: min(52vh, 420px);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        border-radius: 1rem;
        border: 1px solid #1e293b;
      }
      .zoom-viewport.can-pan { cursor: grab; }
      .zoom-viewport.can-pan.is-dragging { cursor: grabbing; }
      .zoom-image-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        transform-origin: center center;
        will-change: transform;
      }
      .zoom-image-wrap img {
        display: block;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }
    </style>
</head>
<body class="pb-20 relative overflow-x-hidden min-h-screen">

    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-900/20 blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-violet-900/20 blur-[100px]"></div>
    </div>

    <div class="relative z-10 max-w-4xl mx-auto px-4 py-8 md:py-12 space-y-6">
        <div id="app"></div>

        <div class="text-center text-sm text-slate-300 bg-slate-900/70 border border-slate-700 rounded-2xl px-4 py-3 shadow-lg">
            Pour toute question, n'hésitez pas à écrire à Artem sur WhatsApp.
        </div>
    </div>

    <div id="image-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm p-2 sm:p-4 hidden">
        <div class="modal-content bg-slate-900 rounded-2xl border border-slate-700 w-full max-w-lg sm:max-w-4xl md:max-w-6xl p-4 sm:p-6 relative shadow-2xl flex flex-col max-h-[92vh] overflow-hidden">
            <button onclick="closeImageModal()" class="absolute top-3 right-3 sm:top-4 sm:right-4 p-2 bg-slate-800 text-slate-400 hover:text-white rounded-full border border-slate-700">
                <i data-lucide="x"></i>
            </button>

            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4 sm:mb-6 pr-0 sm:pr-12">
                <h3 id="modal-title" class="text-xl font-bold text-white flex-1">Titre</h3>
                <label id="upload-label" class="self-start sm:self-auto flex items-center gap-2 px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white rounded-lg cursor-pointer transition-colors text-sm font-semibold shadow-md">
                    <i data-lucide="upload" class="w-4 h-4"></i>
                    <span>Ajouter photos</span>
                    <input type="file" accept="image/*" multiple class="hidden" onchange="handleImageUpload(event)">
                </label>
            </div>

            <div id="modal-gallery" class="flex-1 flex flex-col gap-4 overflow-y-auto pr-1 sm:pr-2 pb-4"></div>

            <p class="text-center text-sm text-slate-400 mt-auto border-t border-slate-800 pt-4">
               Les photos que vous ajoutez resteront enregistrées ici.
            </p>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'nathan_user_images';

        const COURSE_DATA = [
            {
                id: 'mod-1',
                title: 'MODULE 1',
                subtitle: 'MINI-BLOCS DIATONIQUES',
                lessons: [
                    {
                        id: 'n1-l1',
                        title: 'Leçon 1 — Mini-blocs diatoniques',
                        description: 'Construction de la gamme majeure sur le manche via les mini-blocs (quartes et triton).',
                        showScheme: true,
                        schemeUrl: 'images/mini-blocks2.png',
                        details: [
                            'Structure de la gamme majeure : ton — ton — demi-ton — ton — ton — ton — demi-ton. Exceptions : si–do et mi–fa (demi-tons).',
                            'Mini-blocs sur 2 cordes : 6 quartes + 1 triton. Deux intervalles de base — la quarte et le triton.',
                            'Géométrie : les mini-blocs sont symétriques par rapport au premier degré (miroir).'
                        ],
                        pratique: [
                            'Répéter les mini-blocs en Mi majeur et Do majeur.',
                            'Construire les mêmes blocs à partir de Fa majeur — mémoriser leur position sur le manche.'
                        ]
                    }
                ]
            }
        ];

        let expandedLessons = new Set(['n1-l1']);
        let userUploadedImages = {};
        let currentImageTaskId = null;
        let imageCarouselIndex = {};
        let imageZoom = { scale: 1, panX: 0, panY: 0, minScale: 1, maxScale: 5, fitWidth: 0, fitHeight: 0 };
        let zoomDrag = { active: false, startX: 0, startY: 0, panStartX: 0, panStartY: 0 };
        let pinchState = { active: false, startDistance: 0, startScale: 1 };

        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            userUploadedImages = stored ? JSON.parse(stored) : {};
        } catch (e) {
            console.warn('localStorage not available');
        }

        COURSE_DATA.flatMap(m => m.lessons).forEach(lesson => {
            if (!lesson.showScheme || !lesson.schemeUrl) return;
            const key = `scheme-${lesson.id}`;
            if (
                !userUploadedImages[key] ||
                userUploadedImages[key].length === 0 ||
                userUploadedImages[key][0] !== lesson.schemeUrl
            ) {
                userUploadedImages[key] = [lesson.schemeUrl];
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(userUploadedImages));
                } catch (e) {}
            }
        });

        function saveImages() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(userUploadedImages));
            } catch (e) {}
        }

        function renderApp() {
            const app = document.getElementById('app');

            let html = `
                <header class="mb-10 text-center md:text-left border-b border-slate-800 pb-6">
                    <div class="flex items-center justify-center md:justify-start gap-3 mb-2">
                        <div class="p-2 bg-gradient-to-br from-violet-600 to-blue-600 rounded-lg shadow-lg">
                            <i data-lucide="music-2" class="text-white w-7 h-7"></i>
                        </div>
                        <h2 class="text-xl font-bold tracking-wider text-slate-400 uppercase">BassMastery</h2>
                    </div>
                    <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-100 via-violet-200 to-blue-200 mb-2">
                        Espace Nathan
                    </h1>
                    <p class="text-slate-400 max-w-lg">Mini-blocs diatoniques : construction et positionnement sur le manche.</p>
                </header>

                <div class="space-y-12">
            `;

            COURSE_DATA.forEach(module => {
                html += `
                    <div class="relative">
                        <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4 mb-6 border-l-4 border-violet-500 pl-4">
                            <h2 class="text-sm font-bold text-violet-400 uppercase tracking-widest">${module.title}</h2>
                            <h3 class="text-2xl md:text-3xl font-bold text-white">${module.subtitle}</h3>
                        </div>
                        <div class="space-y-4">
                `;

                module.lessons.forEach(lesson => {
                    const isExpanded = expandedLessons.has(lesson.id);

                    html += `
                        <div class="group relative bg-slate-900 border border-slate-800 hover:border-slate-600 rounded-2xl overflow-hidden transition-all duration-300">
                            <div onclick="window.toggleLesson('${lesson.id}')" class="p-6 flex items-center justify-between cursor-pointer transition-colors bg-slate-800/30 hover:bg-slate-800/50">
                                <div class="flex-1">
                                    <h4 class="text-lg md:text-xl font-bold mb-1 text-slate-200">${lesson.title}</h4>
                                    <p class="text-slate-400 text-sm md:text-base pr-4">${lesson.description}</p>
                                </div>
                                <div class="text-slate-500">
                                    <i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" class="w-6 h-6"></i>
                                </div>
                            </div>

                            ${isExpanded ? `
                                <div class="p-6 pt-0 border-t border-slate-800/50 bg-slate-900/50 fade-in">
                                    ${lesson.details ? `
                                        <div class="mb-6 mt-6 bg-slate-800/40 p-5 rounded-xl border border-slate-700/50">
                                            <div class="flex items-center justify-between mb-3">
                                                <h5 class="text-violet-400 font-semibold text-xs uppercase tracking-wide flex items-center gap-2">
                                                    <i data-lucide="book-open" class="w-4 h-4"></i> Points Clés
                                                </h5>
                                                ${lesson.showScheme ? `
                                                    <button onclick="window.openImageModal(event, 'scheme-${lesson.id}', '${lesson.title.replace(/'/g, "\\'")}')" class="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded text-xs font-bold uppercase tracking-wider transition-colors shadow-lg">
                                                        <i data-lucide="eye" class="w-3 h-3"></i> Voir
                                                    </button>
                                                ` : ''}
                                            </div>
                                            <ul class="space-y-2">
                                                ${lesson.details.map(d => `<li class="flex items-start gap-2 text-slate-300 text-sm"><span class="mt-1.5 w-1.5 h-1.5 rounded-full bg-blue-500 flex-shrink-0"></span>${d}</li>`).join('')}
                                            </ul>
                                        </div>
                                    ` : ''}

                                    ${lesson.pratique && lesson.pratique.length > 0 ? `
                                        <div class="bg-emerald-900/10 p-5 rounded-xl border border-emerald-500/30">
                                            <h5 class="text-emerald-400 font-semibold text-xs uppercase tracking-wide mb-3 flex items-center gap-2">
                                                <i data-lucide="target" class="w-4 h-4"></i> Pratique
                                            </h5>
                                            <ul class="space-y-2">
                                                ${lesson.pratique.map(p => `<li class="flex items-start gap-2 text-slate-300 text-sm"><span class="mt-1.5 w-1.5 h-1.5 rounded-full bg-emerald-500 flex-shrink-0"></span>${p}</li>`).join('')}
                                            </ul>
                                        </div>
                                    ` : ''}
                                </div>
                            ` : ''}
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            html += `</div>`;
            app.innerHTML = html;
            lucide.createIcons();
        }

        window.toggleLesson = (lessonId) => {
            if (expandedLessons.has(lessonId)) expandedLessons.delete(lessonId);
            else expandedLessons.add(lessonId);
            renderApp();
        };

        window.openImageModal = (e, taskId, title) => {
            e.stopPropagation();
            currentImageTaskId = taskId;
            if (imageCarouselIndex[currentImageTaskId] === undefined) imageCarouselIndex[currentImageTaskId] = 0;
            resetImageZoom();
            document.getElementById('modal-title').innerText = title;
            const modal = document.getElementById('image-modal');
            modal.classList.remove('hidden');
            modal.querySelector('.modal-content').scrollTop = 0;
            const uploadLabel = document.getElementById('upload-label');
            uploadLabel.style.display = taskId.startsWith('scheme-') ? 'none' : 'flex';
            renderGallery();
        };

        window.closeImageModal = () => {
            document.getElementById('image-modal').classList.add('hidden');
            currentImageTaskId = null;
        };

        function getTouchDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.hypot(dx, dy);
        }

        function clampImagePan() {
            const viewport = document.getElementById('zoom-viewport');
            if (!viewport || !imageZoom.fitWidth) return;

            const vw = viewport.clientWidth;
            const vh = viewport.clientHeight;
            const scaledW = imageZoom.fitWidth * imageZoom.scale;
            const scaledH = imageZoom.fitHeight * imageZoom.scale;

            if (scaledW <= vw) imageZoom.panX = 0;
            else {
                const maxX = (scaledW - vw) / 2;
                imageZoom.panX = Math.min(maxX, Math.max(-maxX, imageZoom.panX));
            }

            if (scaledH <= vh) imageZoom.panY = 0;
            else {
                const maxY = (scaledH - vh) / 2;
                imageZoom.panY = Math.min(maxY, Math.max(-maxY, imageZoom.panY));
            }

            if (viewport) {
                viewport.classList.toggle('can-pan', imageZoom.scale > 1.01);
            }
        }

        function applyImageZoomTransform() {
            const wrap = document.getElementById('zoom-image-wrap');
            const label = document.getElementById('zoom-level-label');
            if (!wrap) return;
            wrap.style.transform = `translate(${imageZoom.panX}px, ${imageZoom.panY}px) scale(${imageZoom.scale})`;
            if (label) label.textContent = `${Math.round(imageZoom.scale * 100)}%`;
            clampImagePan();
        }

        function resetImageZoom() {
            imageZoom.scale = 1;
            imageZoom.panX = 0;
            imageZoom.panY = 0;
        }

        function setImageZoom(nextScale) {
            imageZoom.scale = Math.min(imageZoom.maxScale, Math.max(imageZoom.minScale, nextScale));
            clampImagePan();
            applyImageZoomTransform();
        }

        window.zoomImageIn = () => setImageZoom(imageZoom.scale * 1.25);
        window.zoomImageOut = () => setImageZoom(imageZoom.scale / 1.25);
        window.zoomImageReset = () => fitImageToViewport();

        function fitImageToViewport() {
            const viewport = document.getElementById('zoom-viewport');
            const img = document.getElementById('zoom-image');
            if (!viewport || !img || !img.naturalWidth) return;

            const vw = viewport.clientWidth;
            const vh = viewport.clientHeight;
            const fit = Math.min(vw / img.naturalWidth, vh / img.naturalHeight);

            imageZoom.fitWidth = img.naturalWidth * fit;
            imageZoom.fitHeight = img.naturalHeight * fit;
            img.style.width = `${imageZoom.fitWidth}px`;
            img.style.height = `${imageZoom.fitHeight}px`;

            resetImageZoom();
            applyImageZoomTransform();
        }

        function setupZoomPan() {
            const viewport = document.getElementById('zoom-viewport');
            const img = document.getElementById('zoom-image');
            if (!viewport || !img) return;

            if (viewport._zoomBound) return;
            viewport._zoomBound = true;

            const onPointerDown = (e) => {
                if (e.target.closest('button')) return;
                if (pinchState.active) return;
                if (imageZoom.scale <= 1.01) return;
                zoomDrag.active = true;
                zoomDrag.startX = e.clientX;
                zoomDrag.startY = e.clientY;
                zoomDrag.panStartX = imageZoom.panX;
                zoomDrag.panStartY = imageZoom.panY;
                viewport.classList.add('is-dragging');
                viewport.setPointerCapture(e.pointerId);
            };

            const onPointerMove = (e) => {
                if (!zoomDrag.active || pinchState.active) return;
                imageZoom.panX = zoomDrag.panStartX + (e.clientX - zoomDrag.startX);
                imageZoom.panY = zoomDrag.panStartY + (e.clientY - zoomDrag.startY);
                applyImageZoomTransform();
            };

            const endDrag = (e) => {
                if (!zoomDrag.active) return;
                zoomDrag.active = false;
                viewport.classList.remove('is-dragging');
                if (e.pointerId !== undefined) {
                    try { viewport.releasePointerCapture(e.pointerId); } catch (_) {}
                }
            };

            viewport.addEventListener('pointerdown', onPointerDown);
            viewport.addEventListener('pointermove', onPointerMove);
            viewport.addEventListener('pointerup', endDrag);
            viewport.addEventListener('pointercancel', endDrag);

            viewport.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    pinchState.active = true;
                    pinchState.startDistance = getTouchDistance(e.touches);
                    pinchState.startScale = imageZoom.scale;
                    zoomDrag.active = false;
                }
            }, { passive: true });

            viewport.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && pinchState.active) {
                    e.preventDefault();
                    const distance = getTouchDistance(e.touches);
                    if (pinchState.startDistance > 0) {
                        setImageZoom(pinchState.startScale * (distance / pinchState.startDistance));
                    }
                }
            }, { passive: false });

            viewport.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) pinchState.active = false;
            });

            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const factor = e.deltaY > 0 ? 0.9 : 1.1;
                setImageZoom(imageZoom.scale * factor);
            }, { passive: false });

            const onImageReady = () => {
                fitImageToViewport();
            };

            if (img.complete) onImageReady();
            else img.onload = onImageReady;
        }

        window.renderGallery = () => {
            const gallery = document.getElementById('modal-gallery');
            const images = userUploadedImages[currentImageTaskId] || [];

            if (images.length === 0) {
                gallery.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-40 sm:h-48 text-slate-500 border-2 border-dashed border-slate-700 rounded-xl">
                        <i data-lucide="image" class="w-12 h-12 mb-2 opacity-50"></i>
                        <p class="italic">Aucune photo pour l'instant.</p>
                    </div>`;
            } else {
                const total = images.length;
                let activeIndex = imageCarouselIndex[currentImageTaskId] || 0;
                if (activeIndex >= total) activeIndex = total - 1;
                if (activeIndex < 0) activeIndex = 0;
                imageCarouselIndex[currentImageTaskId] = activeIndex;
                const activeImage = images[activeIndex];

                gallery.innerHTML = `
                    <div class="flex flex-wrap items-center justify-between gap-2 mb-2">
                        <p class="text-xs text-slate-400">Pincez pour zoomer · Glissez pour déplacer (après zoom)</p>
                        <div class="flex items-center gap-2">
                            <button type="button" onclick="window.zoomImageOut()" class="p-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg border border-slate-700" title="Zoom arrière">
                                <i data-lucide="zoom-out" class="w-4 h-4"></i>
                            </button>
                            <span id="zoom-level-label" class="text-xs font-semibold text-slate-300 min-w-[3rem] text-center">100%</span>
                            <button type="button" onclick="window.zoomImageIn()" class="p-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg border border-slate-700" title="Zoom avant">
                                <i data-lucide="zoom-in" class="w-4 h-4"></i>
                            </button>
                            <button type="button" onclick="window.zoomImageReset()" class="p-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg border border-slate-700" title="Réinitialiser">
                                <i data-lucide="maximize-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <div id="zoom-viewport" class="zoom-viewport">
                        <div id="zoom-image-wrap" class="zoom-image-wrap">
                            <img id="zoom-image" src="${activeImage}" alt="Schéma" onerror="this.style.display='none'; document.getElementById('zoom-fallback').style.display='flex';" />
                        </div>
                        <div id="zoom-fallback" class="hidden absolute inset-0 flex-col items-center justify-center text-slate-500 p-8">
                            <i data-lucide="image-off" class="w-16 h-16 mb-4 opacity-50"></i>
                            <p class="text-sm">Image non chargée</p>
                        </div>
                        ${total > 1 ? `
                        <div class="absolute inset-y-0 left-0 flex items-center z-10">
                            <button onclick="window.changeImageSlide(-1)" class="p-3 bg-black/50 hover:bg-black/70 text-white rounded-r-lg transition-colors">
                                <i data-lucide="chevron-left" class="w-6 h-6"></i>
                            </button>
                        </div>
                        <div class="absolute inset-y-0 right-0 flex items-center z-10">
                            <button onclick="window.changeImageSlide(1)" class="p-3 bg-black/50 hover:bg-black/70 text-white rounded-l-lg transition-colors">
                                <i data-lucide="chevron-right" class="w-6 h-6"></i>
                            </button>
                        </div>
                        <div class="absolute bottom-0 left-0 w-full bg-black/70 px-3 py-2 text-center text-sm text-slate-100 z-10">
                            Photo ${activeIndex + 1} / ${total}
                        </div>
                        ` : ''}
                    </div>
                    ${total > 1 ? `
                    <div class="flex justify-center gap-2">
                        ${images.map((_, idx) => `
                            <button onclick="window.setImageSlide(${idx})" class="w-3 h-3 rounded-full ${idx === activeIndex ? 'bg-violet-400' : 'bg-slate-600'}"></button>
                        `).join('')}
                    </div>
                    ` : ''}
                `;
                setupZoomPan();
            }
            lucide.createIcons();
        };

        window.handleImageUpload = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    if (!userUploadedImages[currentImageTaskId]) userUploadedImages[currentImageTaskId] = [];
                    userUploadedImages[currentImageTaskId].push(reader.result);
                    imageCarouselIndex[currentImageTaskId] = userUploadedImages[currentImageTaskId].length - 1;
                    saveImages();
                    renderGallery();
                };
                reader.readAsDataURL(file);
            });
        };

        window.changeImageSlide = (direction) => {
            if (!currentImageTaskId) return;
            const images = userUploadedImages[currentImageTaskId] || [];
            if (!images.length) return;
            const total = images.length;
            const currentIndex = imageCarouselIndex[currentImageTaskId] || 0;
            imageCarouselIndex[currentImageTaskId] = (currentIndex + direction + total) % total;
            resetImageZoom();
            renderGallery();
        };

        window.setImageSlide = (index) => {
            if (!currentImageTaskId) return;
            const images = userUploadedImages[currentImageTaskId] || [];
            if (!images.length) return;
            imageCarouselIndex[currentImageTaskId] = Math.max(0, Math.min(index, images.length - 1));
            resetImageZoom();
            renderGallery();
        };

        renderApp();
    </script>
</body>
</html>
